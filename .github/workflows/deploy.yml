name: Deploy

# Auto-deploy to the demo VPS once CI passes on main.
# The box is deployed by rsync (no git checkout on it), so we rsync the source
# from the runner and rebuild via docker compose — matching how it was provisioned.
# Fires only after the "CI" workflow succeeds on main, so a red build never ships.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  # Manual escape hatch (Actions → Deploy → Run workflow).
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # workflow_run: only on green CI. workflow_dispatch: always.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    env:
      HOST: ${{ secrets.MICHELIN_SSH_HOST }}
      USER: ${{ secrets.MICHELIN_SSH_USER }}
      PORT: ${{ secrets.MICHELIN_SSH_PORT || 22 }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH (dedicated deploy key)
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          echo "${{ secrets.MICHELIN_SSH_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync source to the box
        run: |
          rsync -az --delete \
            --exclude node_modules --exclude .next --exclude .git \
            --exclude .env --exclude .DS_Store --exclude .github \
            --exclude tsconfig.tsbuildinfo --exclude next-env.d.ts \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=yes" \
            ./ "$USER@$HOST:/opt/michelin-plus/"

      - name: Build & restart (re-seeds demo data)
        run: |
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=yes "$USER@$HOST" \
            'cd /opt/michelin-plus && docker compose --profile app up -d --build && docker image prune -f && docker compose --profile app ps'
